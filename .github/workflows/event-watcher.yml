name: Event Warning Watcher

# Long-running per-minute watcher. Two daily shifts cover ~11 hours of trading;
# GH Actions caps individual jobs at 6 hours so we split. Public repo = unlimited
# Actions minutes. State (events + warning message IDs) is handed off between
# shifts via Actions cache.

on:
  # Primary trigger: external scheduler (Cloudflare Worker) fires
  # repository_dispatch "watcher-shift" twice daily at exact times.
  repository_dispatch:
    types: [watcher-shift]
  # Fallback schedule (GitHub cron — less reliable but covers Cloudflare outages):
  schedule:
    - cron: '0 12 * * 1-5'     # morning shift
    - cron: '30 17 * * 1-5'    # afternoon shift
  workflow_dispatch:
    inputs:
      loop_minutes:
        description: 'Loop duration in minutes (0 = single check)'
        required: false
        default: '0'
      include_all_impacts:
        description: 'Include Low/Holiday events too (testing)'
        required: false
        default: 'false'
      force_refresh:
        description: 'Force a fresh CSV fetch (ignore cached event list)'
        required: false
        default: 'false'

concurrency:
  group: event-watcher
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5 hours; ends before the 6 hr GH cap
    steps:
      - uses: actions/checkout@v4

      - name: Restore watcher state
        uses: actions/cache/restore@v4
        with:
          path: state/
          key: watcher-state-${{ github.run_id }}
          restore-keys: |
            watcher-state-

      - name: Run watcher loop
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE_FILE: ./state/watcher.json
          # Scheduled / dispatched runs loop for ~5.5 hr. Manual runs use the input (default 0).
          LOOP_DURATION_MINUTES: ${{ (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && '325' || inputs.loop_minutes }}
          INCLUDE_ALL_IMPACTS:   ${{ inputs.include_all_impacts || 'false' }}
          FORCE_REFRESH:         ${{ inputs.force_refresh || 'false' }}
        run: ./scripts/Watch-Events.ps1

      - name: Save watcher state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: watcher-state-${{ github.run_id }}
