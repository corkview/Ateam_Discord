name: Daily Economic Events to Discord

on:
  # Primary trigger: external scheduler (Cloudflare Worker) calls
  # repository_dispatch with event_type "daily-post" at exactly 8:05 AM ET.
  repository_dispatch:
    types: [daily-post]
  # Fallback: GitHub cron (less reliable, but covers Cloudflare outages).
  # The script's ET-hour-8 gate keeps these from double-posting.
  schedule:
    - cron: '5 12 * * 1-5'   # 8:05 AM EDT (Mar–Nov)
    - cron: '5 13 * * 1-5'   # 8:05 AM EST (Nov–Mar)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post events to Discord
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Gate scheduled / dispatched runs to 8 AM ET; manual runs skip the gate.
          ENFORCE_ET_HOUR: ${{ (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && '8' || '' }}
        run: ./scripts/Post-EconomicEvents.ps1
