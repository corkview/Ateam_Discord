name: Daily Economic Events to Discord

on:
  schedule:
    # GitHub cron is UTC and runner cron has 1–15 min jitter.
    # 11:00 UTC = 6:00 AM EST / 7:00 AM EDT — drifts one hour seasonally.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:           # manual trigger from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post events to Discord
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: ./scripts/Post-EconomicEvents.ps1
